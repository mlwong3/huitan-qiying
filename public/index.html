<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>繪畫耆才 · 共融數位創作平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ============ Navigation: page-turn notepad tabs (§4.3.5) ============ -->
  <nav class="topbar">
    <div class="logo">繪畫耆才<span class="logo-seal">共融</span></div>
    <div class="nav-tabs">
      <button class="nav-tab page-single active" data-mode="single">獨畫</button>
      <button class="nav-tab page-multi" data-mode="multi">共繪</button>
      <button class="nav-tab page-admin" data-mode="admin">掌櫃</button>
    </div>
  </nav>

  <main>
    <!-- ============ Single home: personal gallery (§9.5) ============ -->
    <section id="screen-single-home" class="screen portal-screen active">
      <div class="portal-inner">
        <div class="portal-topline">
          <h1 class="portal-h1">獨畫<span class="title-dot">·</span>揀一張紙開始<span class="title-seal">樂齡</span></h1>
          <span class="portal-scope">主頁範圍：獨畫入口</span>
        </div>
        <div class="portal-two">
          <div class="portal-col">
            <section class="portal-card portal-pick">
              <div class="gallery-grid" id="single-canvas-grid"></div>
            </section>
          </div>
          <aside class="portal-aside">
            <p class="portal-copy">長者可先選擇畫紙，再用觸控、滑鼠或輔助控制器開始創作。作品會自動保存在本機畫廊。</p>
            <div class="info-pills">
              <span class="info-pill">語音提示 開啟</span>
              <span class="info-pill">防手震 開啟</span>
            </div>
          </aside>
        </div>
        <div class="portal-section">
          <h3 class="section-head">我的作品</h3>
          <div class="gallery-grid" id="my-works-grid"></div>
        </div>
      </div>
    </section>

    <!-- ============ Multi entry: join / create room (§12) ============ -->
    <section id="screen-multi-entry" class="screen portal-screen">
      <div class="portal-inner">
        <div class="portal-topline">
          <h1 class="portal-h1">共繪<span class="title-dot">·</span>邀友同畫<span class="title-seal">樂齡</span></h1>
          <span class="portal-scope">主頁範圍：共繪入口</span>
        </div>
        <div class="portal-two">
          <button class="portal-card room-create-card" id="btn-new-room">
            <span class="room-create-title">＋ 開一間共繪房間</span>
            <span class="room-create-sub">產生四位房間碼，邀請親友一起創作</span>
          </button>
          <div class="portal-card portal-join-card">
            <h2>輸入房間碼</h2>
            <input type="text" id="room-code-input" maxlength="4" inputmode="numeric"
                   placeholder="例如：1234" />
            <button class="big-btn gold" id="btn-join-room">加入</button>
          </div>
        </div>
        <div class="portal-section">
          <h3 class="section-head">我的共繪</h3>
          <div class="room-history-grid" id="my-rooms-grid"></div>
        </div>
      </div>
    </section>

    <!-- ============ Multi gallery: pick canvas for a new room ============ -->
    <section id="screen-multi-gallery" class="screen">
      <h1 class="screen-title">揀一張紙開房</h1>
      <div class="gallery-grid" id="multi-canvas-grid"></div>
      <button class="back-btn" data-mode="multi">← 返回</button>
    </section>

    <!-- ============ Board: shared inclusive painting board (§4, §9, §10) ============ -->
    <section id="screen-board" class="screen">
      <div class="room-banner" id="room-banner" hidden>房間號碼：<span id="room-id-label"></span></div>
      <div class="completion-banner" id="completion-banner" hidden>有新作品完成了！</div>

      <div class="board-layout">
        <!-- Stationery tray sidebar (§6.3) -->
        <aside class="stationery-tray">
          <!-- 文房 + 顏色 scroll together in the middle; 防手震／單鍵創作 toggles and
               封存作品／返回觀賞 stay pinned below so the primary action and mode
               switches never disappear even when the colour palette is tall. -->
          <div class="tray-scroll">
          <!-- 文房: tools panel — compact 2-column grid so everything fits one screen (§6.3) -->
          <section class="tray-panel">
            <h2 class="tray-panel-title">文房</h2>
            <div class="tool-grid">
              <div class="tool-item" data-tool="pen" title="毛筆">
                <span class="tool-art brush"></span><span class="tool-label">毛筆</span>
              </div>
              <div class="tool-item" data-tool="zen" title="禪繞筆">
                <span class="tool-art pen"></span><span class="tool-label">禪繞</span>
              </div>
              <div class="tool-item" data-tool="eraser" title="擦膠">
                <span class="tool-art eraser"></span><span class="tool-label">擦膠</span>
              </div>
              <div class="tool-item" data-tool="mirror" title="鏡子">
                <span class="tool-art mirror"></span><span class="tool-label">鏡子</span>
              </div>
            </div>
            <div class="tray-panel-actions">
              <div class="tool-item tool-item-mini" data-action="undo" id="tool-undo" title="復原一筆">
                <span class="tool-art undo"></span><span class="tool-label">復原</span>
              </div>
              <div class="tool-item clear-all-item" data-action="clear" title="清空畫布">
                <span class="tool-label">全清畫布</span>
              </div>
            </div>
            <div class="brush-size-row">
              <span class="brush-size-label">粗幼</span>
              <input type="range" id="brush-size" min="4" max="28" step="1" value="10" />
            </div>
          </section>

          <!-- 顏色 (原「印泥盒」): seal-pad color selection (§4.3.3) -->
          <section class="tray-panel tray-panel-ink">
            <h2 class="tray-panel-title">顏色</h2>
            <div class="seal-ink-box" id="palette"></div>
          </section>
          </div><!-- /.tray-scroll -->

          <!-- Aid toggles: single column so full labels never clip -->
          <div class="aid-switch-row">
            <!-- One Euro Filter anti-tremor switch (共融創作工具 階段一) -->
            <button class="aid-switch" id="btn-filter" role="switch" aria-checked="true">
              <span class="aid-knob"></span>
              <span class="aid-label">防手震</span>
            </button>

            <!-- Single-switch scanning creation mode -->
            <button class="aid-switch" id="btn-scan-mode" role="switch" aria-checked="false">
              <span class="aid-knob"></span>
              <span class="aid-label">單鍵創作</span>
            </button>
          </div>

          <div class="tray-actions">
            <button class="big-btn finish" id="btn-finish" hidden>封存作品</button>
            <button class="back-btn" id="btn-leave-board">返回觀賞</button>
          </div>
        </aside>

        <!-- Window-scape canvas (§4.3.1) -->
        <div class="board-container">
          <div class="window-pane">
            <button id="window-latch" title="清空畫布"></button>
            <div class="canvas-stack">
              <img id="board-bg" alt="線稿" hidden />
              <img id="draw-template" alt="描圖線稿" hidden />
              <div id="elements-layer"></div>
              <canvas id="paint-canvas" width="1200" height="800"></canvas>
              <div id="scan-placement-preview" hidden></div>
              <div id="peer-cursors"></div>
            </div>
            <section class="scan-panel" id="scan-panel" hidden aria-live="polite">
              <div class="scan-status">
                <span class="scan-step" id="scan-step-label">選圖元</span>
                <span class="scan-hint" id="scan-hint">按空白鍵、Enter 或點擊畫面確認</span>
              </div>
              <div class="scan-options" id="scan-options"></div>
              <button class="scan-confirm" id="scan-confirm">確認目前選項</button>
            </section>
            <!-- Floating bottom toolbar over the canvas (提筆已取消：一開板即可直接畫) -->
            <div class="board-toolbar">
              <button class="board-toolbar-btn" id="btn-change-lineart">換線稿</button>
              <button class="board-toolbar-btn save" id="btn-save-image">保存圖片</button>
            </div>
            <div class="windowsill">
              <!-- Windowsill cat assistant (§4.3.4 / §11) -->
              <div class="cat" id="cat" title="點我用聲控">
                <div class="cat-body"></div>
                <div class="cat-head">
                  <div class="ear left"></div>
                  <div class="ear right"></div>
                  <div class="eye left"><span class="pupil"></span></div>
                  <div class="eye right"><span class="pupil"></span></div>
                  <div class="nose"></div>
                </div>
                <div class="cat-tail"></div>
              </div>
              <div class="cat-bubble" id="cat-bubble" hidden></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 共繪：描圖線稿選擇（新增／繪畫視圖顯示）— 半透明鋪底俾長者照住描 -->
      <div class="template-picker" id="template-picker">
        <span class="template-picker-label">描圖線稿：</span>
        <div class="template-picker-row" id="template-picker-row"></div>
      </div>

      <!-- 共繪：底部操作列。房間視圖顯示「新增／退出」；繪畫視圖顯示「放入／返回」 -->
      <div class="multi-actionbar" id="multi-actionbar">
        <button class="big-btn gold" id="btn-add-contribution">＋ 新增</button>
        <button class="back-btn" id="btn-exit-room">退出</button>
        <button class="big-btn gold" id="btn-place">放入</button>
        <button class="back-btn" id="btn-back-to-room">返回</button>
      </div>

      <!-- Seal ceremony overlay (§4.3.8) -->
      <div class="seal-ceremony" id="seal-ceremony" hidden>
        <div class="scroll-paper"><div class="seal-stamp">封</div></div>
      </div>

    </section>

    <!-- ============ Admin: line-art management (§13) ============ -->
    <section id="screen-admin" class="screen portal-screen">
      <div class="portal-inner">
        <div class="portal-topline">
          <h1 class="portal-h1">掌櫃<span class="title-dot">·</span>線稿管理<span class="title-seal">樂齡</span></h1>
          <span class="portal-scope">主頁範圍：掌櫃入口</span>
        </div>
        <div class="portal-two">
          <div class="portal-card admin-portal-card">
            <p class="portal-copy">登入後可管理長者創作用的線稿及畫紙</p>
            <div id="admin-login" class="admin-login">
              <input type="password" id="admin-pass" placeholder="輸入掌櫃密碼" />
              <button class="big-btn gold" id="btn-admin-login">進入</button>
              <p class="hint" id="admin-hint"></p>
            </div>
            <div id="admin-panel" hidden>
              <form id="upload-form" class="upload-form">
                <label class="file-pick">
                  <input type="file" id="lineart-file" accept="image/*" />
                  <span>揀圖片</span>
                </label>
                <button class="big-btn gold" type="submit">上傳線稿</button>
                <span id="upload-status" class="hint"></span>
              </form>
              <div class="gallery-grid" id="admin-lineart-grid"></div>
            </div>
          </div>
          <div class="portal-card info-card">
            <h2>可管理項目</h2>
            <ul class="manage-list">
              <li>上傳線稿</li>
              <li>刪除舊畫紙</li>
              <li>整理主題分類</li>
            </ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="oneEuroFilter.js"></script>
  <script src="pointerSources.js"></script>
  <script src="script.js"></script>
</body>
</html>
